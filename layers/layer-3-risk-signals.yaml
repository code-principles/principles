    - "hot path"
    - "real-time"
    - "realtime"
    - "low-latency"
    - "low_latency"
    - "performance"
    - "benchmark"
    - "throughput"
    - "cache"
    - "pool"
    - "buffer"
    - "batch_size"
    - "optimization"
    - "critical_path"
    - "microsecond"
    - "nanosecond"
  elevate:
    - PF-001
    - PF-002
    - PF-003
    - PF-004
    - PF-005
    - CC-006

