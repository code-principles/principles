    - "personal_data"
    - "consent"
    - "data_subject"
    - "anonymize"
    - "pseudonymize"
    - "encryption"
    - "CCPA"
    - "HIPAA"
  elevate:
    - SEC-001
    - SEC-003
    - SEC-005
    - SEC-010

public-api:
  description: "Versioned or published APIs consumed by third-party clients"
  signals:
