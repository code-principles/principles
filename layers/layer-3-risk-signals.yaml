    - "v1"
    - "v2"
    - "published"
    - "third-party"
    - "external"
    - "consumer"
    - "backward_compatible"
    - "deprecat"
    - "changelog"
    - "breaking_change"
    - "semver"
    - "api_version"
    - "public_api"
  elevate:
    - API-014
    - API-001
    - API-004
    - RL-007

